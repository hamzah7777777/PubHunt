    <!-- Press Start 2P (headings/UI) + VT323 (body/readable pixel text), plus
         per-pub-hint theme fonts chosen as the closest real clone of each
         game's actual typeface: Silkscreen (Minecraft / GBA dot-matrix),
         Comfortaa (The Sims' rounded "Sims Sans"), Cinzel + EB Garamond
         (World of Warcraft's engraved Friz Quadrata headers + parchment
         body serif), Bebas Neue + Oswald (Call of Duty's condensed
         military HUD), Roboto (closest free substitute for "Univers Next
         for HSBC", HSBC's actual licensed corporate typeface, which isn't
         freely distributable). Among Us uses the system font Trebuchet MS
         directly (its actual UI font), so no webfont load is needed there. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Silkscreen:wght@400;700&family=Comfortaa:wght@400;700&family=Cinzel:wght@400;700&family=EB+Garamond:ital@0;1&family=Bebas+Neue&family=Oswald:wght@400;500&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  </head>
