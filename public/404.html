<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Sheffield Pub Hunt 2026</title>
    <!-- GitHub Pages serves this for any unknown path. The app is a single
         page, so known app paths are forwarded to their hash form (which
         index.html handles); anything else gets a small 404 with a way home. -->
    <script>
      var path = window.location.pathname.replace(/\/+$/, '');
      if (/\/results$/i.test(path)) {
        window.location.replace(path.slice(0, -'results'.length) + '#results');
      } else if (/\/awards2026$/i.test(path)) {
        window.location.replace(path.slice(0, -'awards2026'.length) + '#awards2026');
      } else if (/\/gallery$/i.test(path)) {
        window.location.replace(path.slice(0, -'gallery'.length) + '#gallery');
      } else if (/\/into-the-weeds$/i.test(path)) {
        window.location.replace(path.slice(0, -'into-the-weeds'.length) + '#into-the-weeds');
      } else if (/\/speaking-the-truth$/i.test(path)) {
        window.location.replace(path.slice(0, -'speaking-the-truth'.length) + '#speaking-the-truth');
      }
    </script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0C0B14;
        color: #C7C3E0;
        font-family: 'Courier New', monospace;
        text-align: center;
      }
      .panel {
        border: 2px solid #F5F3FF;
        box-shadow: 5px 5px 0 0 #000000;
        background: #1A1828;
        padding: 32px 28px;
        max-width: 340px;
        margin: 16px;
      }
      h1 { color: #F5F3FF; font-size: 22px; letter-spacing: 2px; margin: 0 0 12px; }
      p { font-size: 15px; line-height: 1.5; margin: 0 0 20px; }
      a {
        display: inline-block;
        background: #5B2EFF;
        color: #FFFFFF;
        border: 3px solid #F5F3FF;
        box-shadow: 4px 4px 0 0 #000000;
        padding: 12px 20px;
        font-weight: bold;
        text-decoration: none;
        text-transform: uppercase;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>404 — GAME OVER</h1>
      <p>This screen doesn&rsquo;t exist. Insert coin to continue.</p>
      <a href="/">Back to Pub Hunt</a>
    </div>
  </body>
</html>
